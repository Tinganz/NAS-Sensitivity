arch_id: 8
lr: 0.001
lr_patience: 10
lr_scheduler_factor: 0.5
max_epochs: 150
model_cfg:
  arch_id: 8
  dynamic:
    activation: relu
    conv_layers:
    - kernel_size: 3
      out_channels: 8
      padding: 0
      pool_size: 2
      stride: 1
    fc_layers:
    - 64
    in_channels: 1
    input_length: 1080
optimizer: adam
scheduler: reduce_on_plateau
weight_decay: 1.0e-05
