arch_id: 8
lr: 5.0e-05
lr_patience: 20
lr_scheduler_factor: 0.5
max_epochs: 700
model_cfg:
  arch_id: 8
  dynamic:
    activation: elu
    conv_layers:
    - kernel_size: 3
      out_channels: 16
      padding: 0
      pool_size: 4
      stride: 1
    - kernel_size: 3
      out_channels: 32
      padding: 0
      pool_size: 2
      stride: 1
    fc_layers:
    - 32
    in_channels: 1
    input_length: 1080
optimizer: adam
scheduler: reduce_on_plateau
weight_decay: 0.0001
