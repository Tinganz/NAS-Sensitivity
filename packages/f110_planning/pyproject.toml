[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "f110-planning"
version = "0.1.1"
description = "Planning algorithms for F1TENTH gym environment"
requires-python = ">=3.10"
dependencies = [
  "numpy>=1.23.5",
  "pandas>=1.5.3",
  "numba>=0.57.0",
  "pyglet>=2.0.10",
  "simple-pid>=2.0.0",
  "torch>=2.0.0",
  "f110-gym",
]

[project.optional-dependencies]
test = [
  "pytest",
  "pytest-mock",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
