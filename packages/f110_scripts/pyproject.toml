[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "f110-scripts"
version = "0.1.0"
authors = [
  {name = "Prateek Ganguli", email = "prateek.ganguli@gmail.com"},
  {name = "Tingan Zhu", email = "tingan@cs.unc.edu"},
  {name = "Cem Baykal", email = "cembay@cs.unc.edu"}
]
description = "Scripts for F1TENTH gym and planners"
requires-python = ">=3.10"
dependencies = [
  "f110-gym",
  "f110-planning",
  "lightning>=2.0.0",
  "tensorboard>=2.14.0",
  "torchao>=0.5.0",
  "stable-baselines3>=2.0.0",
]

[project.optional-dependencies]
test = [
  "pytest",
  "pytest-mock",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
