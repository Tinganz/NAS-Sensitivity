[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "f110-scripts"
version = "0.1.0"
description = "Scripts for F1TENTH gym and planners"
requires-python = ">=3.9"
dependencies = [
  "f110-gym",
  "f110-planning",
  "lightning>=2.0.0",
  "tensorboard>=2.14.0",
  "torchao>=0.5.0",
  "stable-baselines3>=2.0.0",
  "tqdm>=4.0.0",
  "rich>=13.0.0",
]

[project.optional-dependencies]
test = ["pytest", "pytest-mock"]

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]
