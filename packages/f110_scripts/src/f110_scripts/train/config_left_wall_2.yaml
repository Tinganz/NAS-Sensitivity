# Left Wall prediction -- arch 2
data:
  train_path: "data/datasets/combined_all.npz"
  target_col: "left_wall_dist"
  batch_size: 128
  num_workers: 8
  val_split: 0.1
  pin_memory: true
  prefetch_factor: 2

training:
  max_epochs: 150
  lr: 1e-3
  weight_decay: 1e-5
  early_stopping_patience: 15
  lr_patience: 10
  lr_scheduler_factor: 0.5
  optimizer: adam
  scheduler: reduce_on_plateau
  auto_lr_find: true
  resume: true
  precision: "32"
  gradient_clip_val: 1.0
  profiler: null

model:
  arch_id: 2
