arch_id: 8
lr: 0.001
lr_patience: 5
lr_scheduler_factor: 0.5
max_epochs: 11
model_cfg:
  arch_id: 8
  dynamic:
    activation: elu
    conv_layers:
    - kernel_size: 3
      out_channels: 24
      padding: 0
      pool_size: 8
      stride: 1
    - kernel_size: 3
      out_channels: 117
      padding: 0
      pool_size: 2
      stride: 1
    - kernel_size: 3
      out_channels: 29
      padding: 0
      pool_size: 2
      stride: 1
    - kernel_size: 3
      out_channels: 101
      padding: 0
      pool_size: 8
      stride: 1
    fc_layers:
    - 44
    in_channels: 1
    input_length: 1080
optimizer: adam
scheduler: reduce_on_plateau
weight_decay: 1.0e-05
