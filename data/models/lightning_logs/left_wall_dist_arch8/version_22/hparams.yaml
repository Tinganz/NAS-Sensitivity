arch_id: 8
lr: 0.001
lr_patience: 5
lr_scheduler_factor: 0.5
max_epochs: 11
model_cfg:
  arch_id: 8
  dynamic:
    activation: relu
    conv_layers:
    - kernel_size: 3
      out_channels: 45
      padding: 0
      pool_size: 2
      stride: 1
    - kernel_size: 3
      out_channels: 10
      padding: 0
      pool_size: 8
      stride: 1
    - kernel_size: 3
      out_channels: 55
      padding: 0
      pool_size: 4
      stride: 1
    fc_layers:
    - 72
    in_channels: 1
    input_length: 1080
optimizer: adam
scheduler: reduce_on_plateau
weight_decay: 1.0e-05
