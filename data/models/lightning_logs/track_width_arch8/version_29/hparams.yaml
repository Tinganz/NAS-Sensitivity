arch_id: 8
lr: 0.001
lr_patience: 5
lr_scheduler_factor: 0.5
max_epochs: 16
model_cfg:
  arch_id: 8
  dynamic:
    activation: elu
    conv_layers:
    - kernel_size: 3
      out_channels: 46
      padding: 0
      pool_size: 4
      stride: 1
    - kernel_size: 3
      out_channels: 110
      padding: 0
      pool_size: 4
      stride: 1
    - kernel_size: 3
      out_channels: 63
      padding: 0
      pool_size: 4
      stride: 1
    fc_layers:
    - 90
    in_channels: 1
    input_length: 1080
optimizer: adam
scheduler: reduce_on_plateau
weight_decay: 1.0e-05
